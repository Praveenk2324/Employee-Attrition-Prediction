stages:
  ingest:
    cmd: python src/ingest.py
    deps:
      - data/raw/HR-Employee-Attrition.csv
      - src/ingest.py
      - config/config.yaml

    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  train:
      cmd: python src/train.py
      deps:
        - src/train.py
        - src/pipeline.py
        - src/evaluate.py
        - src/predict.py
        - data/processed/train.csv
        - data/processed/test.csv
        - config/config.yaml
      outs:
        - artifacts/pipeline.pkl
      metrics:
        - reports/metrics.json:
            cache: false
      plots:
        - reports/feature_importance.csv:
            cache: false